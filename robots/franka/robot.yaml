# Franka Emika Panda — 7-DoF arm.
# Source: mujoco_menagerie / franka_emika_panda (Apache-2.0).
# Pulled in by scripts/fetch_assets.sh.
#
# Scope: arm only (7 DoF). The gripper fingers are intentionally excluded
# from joint_names so /joint_command stays uniform across all packs. To
# expose the gripper, add "finger_joint1" / "finger_joint2" to joint_names
# (or fork a separate pack — see docs/TOPICS.md "Extension: gripper topic").

robot:
  source: mjcf
  source_rel: mjcf/panda.xml
  base_position: [0.0, 0.0, 0.0]

sim:
  physics_hz: 400
  substeps: 1
  solver: mujoco         # panda.xml ships MuJoCo actuators; SolverMuJoCo honors them
  ground_plane: true

joint_names:
  - joint1
  - joint2
  - joint3
  - joint4
  - joint5
  - joint6
  - joint7

home_pose:
  joint1: 0.0
  joint2: -0.7854
  joint3: 0.0
  joint4: -2.3562
  joint5: 0.0
  joint6: 1.5708
  joint7: 0.7854

drive:
  mode: position
  stiffness: 8000.0
  damping: 80.0

ros:
  joint_states_topic:   /joint_states
  joint_command_topic:  /joint_command
  publish_rate_hz:      100
