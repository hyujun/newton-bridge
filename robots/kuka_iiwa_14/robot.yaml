# KUKA LBR iiwa 14 — 7-DoF arm (successor to the DLR/KUKA LWR4+ line).
# Source: mujoco_menagerie / kuka_iiwa_14 (Apache-2.0).
# Pulled in by scripts/fetch_assets.sh.

robot:
  source: mjcf
  source_rel: mjcf/iiwa14.xml
  base_position: [0.0, 0.0, 0.0]

sim:
  physics_hz: 400
  substeps: 1
  solver: mujoco
  ground_plane: true

joint_names:
  - joint1
  - joint2
  - joint3
  - joint4
  - joint5
  - joint6
  - joint7

home_pose:
  joint1: 0.0
  joint2: 0.0
  joint3: 0.0
  joint4: -1.5708
  joint5: 0.0
  joint6: 1.5708
  joint7: 0.0

drive:
  mode: position
  stiffness: 10000.0
  damping: 100.0

ros:
  joint_states_topic:   /joint_states
  joint_command_topic:  /joint_command
  publish_rate_hz:      100
